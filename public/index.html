<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MediTest BD API</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7fbff;
        color: #122033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
        border: 1px solid #dbe7f3;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(18, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #52627a;
        line-height: 1.6;
      }

      a {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MediTest BD API</h1>
      <p>The backend is deployed. Use the health endpoint to verify the API runtime.</p>
      <a href="/api/health">Open /api/health</a>
    </main>
  </body>
</html>
