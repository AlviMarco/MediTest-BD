services:
  - type: web
    name: meditest-bd-api
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm run render:build:api
    startCommand: npm run render:start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_LOGGING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: THROTTLE_TTL_MS
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "120"
