[build]
base = "apps/admin"
command = "npm ci && npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "22.22.0"
NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[headers]]
for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
